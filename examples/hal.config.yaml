# Optional: path to a custom env file (and its .local sibling); when set, config-dir .env is not loaded.
# env: ~/.hal/secrets.env

globals:
  access:
    allowedUserIds:
      - ${USER_MARCO_IPHONE_ID}
providers:
  codex: null
  opencode: null
projects:
  obsidian:
    cwd: ./obsidian
    telegram:
      botToken: ${OBSIDIAN_TELEGRAM_TOKEN}
    engine:
      name: codex
      session: user
  frontend:
    cwd: ./frontend
    engine:
      name: codex
    telegram:
      botToken: ${TIMETRACKER_TELEGRAM_TOKEN}
